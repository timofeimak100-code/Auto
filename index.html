<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lords Mobile Автоответчик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; 
            background: #1e1e2f; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Шапка */
        .header {
            background: #2a2a3a;
            padding: 16px 20px;
            border-bottom: 1px solid #3a3a4a;
            flex-shrink: 0;
        }
        
        .header h3 {
            font-size: 18px;
            color: #ffcc88;
        }
        
        .header p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        /* Чат — на весь оставшийся экран */
        .chat { 
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            display: flex;
            flex-direction: column;
        }
        
        .user {
            align-items: flex-end;
        }
        
        .bot {
            align-items: flex-start;
        }
        
        .msg-content {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .user .msg-content {
            background: #6c63ff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .bot .msg-content {
            background: #3a3a4a;
            color: #ffcc88;
            border-bottom-left-radius: 4px;
        }
        
        .msg-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            margin-left: 6px;
        }
        
        /* Нижняя панель ввода — фиксированная */
        .input-area {
            flex-shrink: 0;
            background: #2a2a3a;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #3a3a4a;
        }
        
        input { 
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            background: #1e1e2f;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        input:focus {
            outline: 2px solid #6c63ff;
        }
        
        button { 
            padding: 12px 24px;
            border-radius: 30px;
            background: #6c63ff;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        .small-note {
            text-align: center;
            font-size: 11px;
            color: #555;
            padding: 8px;
            background: #1e1e2f;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="header">
    <h3>🤖 Прокачка Lords Mobile</h3>
    <p>Автоответчик | После заказа укажите ваш Telegram</p>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Напишите сообщение..." />
    <button onclick="sendMessage()">➤</button>
</div>
<div class="small-note">⚠️ Непонятные вопросы и заказы уходят мне в Telegram</div>

<script>
    // ===== ТВОЙ РАБОЧИЙ WORKER (уже правильный) =====
    const WORKER_URL = "https://autobot.timofei-mak100.workers.dev/";
    // ================================================

    // Отправка в Telegram через Worker
    async function sendToTelegram(text) {
        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            });
            const data = await response.json();
            console.log("✅ Отправлено:", data);
        } catch(e) { 
            console.log("❌ Ошибка:", e);
        }
    }

    let waitingForContact = false;
    let pendingOrderText = "";

    function getAutoReply(text) {
        let lowerText = text.toLowerCase();

        // Ждём контакт
        if (waitingForContact) {
            waitingForContact = false;
            let contact = text.trim();
            if (!contact) {
                return "❓ Напишите, пожалуйста, ваш @username или номер телефона.";
            }
            sendToTelegram(`✅ НОВЫЙ ЗАКАЗ!\nКонтакт: ${contact}\nСообщение: "${pendingOrderText}"`);
            return `✅ Спасибо! Ваш контакт (${contact}) передан заказчику. Скоро свяжутся.`;
        }

        // Отказ / игнор
        if (lowerText.includes("нет") || lowerText.includes("не надо") || lowerText.includes("отказ") ||
            lowerText.includes("игнор") || lowerText.includes("не хочу") || lowerText.includes("передумал")) {
            return "❌ Отказ. Заказ не принимается. Если передумаете — напишите 'согласен'.";
        }

        // Согласие
        if (lowerText.includes("согласен") || lowerText.includes("да") || lowerText.includes("беру") || 
            lowerText.includes("оплачу") || lowerText.includes("хочу") || lowerText.includes("давай")) {
            waitingForContact = true;
            pendingOrderText = text;
            return "📱 Отлично! Напишите ваш Telegram @username или номер телефона, чтобы я мог передать контакт заказчику.";
        }

        // Приветствие / описание
        if (lowerText.includes("привет") || lowerText.includes("здравствуй") || lowerText.includes("заказать") || 
            lowerText.includes("прокачать") || lowerText.includes("lords") || lowerText.includes("аккаунт") ||
            lowerText.includes("цена") || lowerText.includes("сколько")) {
            return "👋 Привет! Хочу заказать прокачку аккаунта в Lords Mobile.\n\nСамому заниматься этим неинтересно, но аккаунт нужен для одной цели.\n\nЧто требуется:\n— установить игру;\n— создать аккаунт и привязать к новой пустой почте;\n— прокачать его.\n\nГотов заплатить 200–300 рублей.\n\n✅ Если согласны — напишите 'согласен'.\n❌ Если нет — напишите 'отказ'.";
        }

        // Всё остальное — непонятно, шлём в Telegram
        sendToTelegram(`❓ НЕПОНЯТНОЕ СООБЩЕНИЕ:\nПользователь: "${text}"`);
        return "❓ Не понял. Ваше сообщение отправлено мне. Напишите 'согласен' или 'отказ'.";
    }

    function addMessage(sender, message) {
        const chat = document.getElementById("chat");
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${sender}`;
        
        const label = document.createElement("div");
        label.className = "msg-label";
        label.innerText = sender === 'user' ? '🧑 Вы' : '🤖 Бот';
        
        const content = document.createElement("div");
        content.className = "msg-content";
        content.innerText = message;
        
        msgDiv.appendChild(label);
        msgDiv.appendChild(content);
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const userText = input.value.trim();
        if (!userText) return;
        
        addMessage("user", userText);
        input.value = "";
        
        setTimeout(() => {
            const reply = getAutoReply(userText);
            addMessage("bot", reply);
        }, 400);
    }

    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
        // Приветственное сообщение
        setTimeout(() => {
            addMessage("bot", "👋 Напиши 'Привет' или сразу 'согласен', если хочешь заказать прокачку.");
        }, 300);
    };
</script>
</body>
</html>
