<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lords Mobile Автоответчик</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; background: #1e1e2f; color: #eee; }
        .chat { background: #2a2a3a; border-radius: 20px; padding: 20px; height: 400px; overflow-y: auto; }
        .msg { margin: 10px 0; }
        .user { text-align: right; color: #aaffdd; }
        .bot { text-align: left; color: #ffcc88; background: #3a3a4a; border-radius: 15px; padding: 8px; display: inline-block; max-width: 80%; }
        .input-area { margin-top: 20px; display: flex; gap: 10px; }
        input { flex:1; padding: 10px; border-radius: 25px; border: none; }
        button { padding: 10px 20px; border-radius: 25px; background: #6c63ff; color: white; border: none; cursor: pointer; }
        small { display: block; margin-top: 10px; text-align: center; color: #888; }
    </style>
</head>
<body>
<h3>🤖 Автоответчик — прокачка Lords Mobile</h3>
<div class="chat" id="chat"></div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="Напишите сообщение..." />
    <button onclick="sendMessage()">Отправить</button>
</div>
<small>⚠️ После заказа нужно будет указать ваш Telegram</small>

<script>
    const BOT_TOKEN = "8702458165:AAEsKF_APM5RwleyHjXD-Iiw4kS_tW0KCUs";
    const YOUR_ID = "5780763263";
    
    // Состояние: ждём ли мы контакт от пользователя
    let waitingForContact = false;
    let pendingOrderText = "";

    async function sendToTelegram(text) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: YOUR_ID, text: text })
            });
        } catch(e) { console.log("Ошибка отправки:", e); }
    }

    function getAutoReply(text, previousMessage) {
        let lowerText = text.toLowerCase();

        // Если ждём контакт от пользователя
        if (waitingForContact) {
            waitingForContact = false;
            let contact = text.trim();
            // Отправляем в Telegram с контактом
            sendToTelegram(`✅ ЗАКАЗ ОТ ${contact}\nСообщение: "${pendingOrderText}"`);
            return `✅ Спасибо! Ваш контакт (${contact}) передан заказчику. Он свяжется с вами в ближайшее время.`;
        }

        // Отказ/игнор
        if (lowerText.includes("нет") || lowerText.includes("не надо") || lowerText.includes("отказ") ||
            lowerText.includes("игнор") || lowerText.includes("не хочу")) {
            return "❌ Отказ. Заказ не принимается.";
        }

        // Согласие — запрашиваем контакт
        if (lowerText.includes("согласен") || lowerText.includes("да") || lowerText.includes("беру") || lowerText.includes("оплачу")) {
            waitingForContact = true;
            pendingOrderText = text;
            return "📱 Отлично! Напишите ваш Telegram @username или номер телефона, чтобы я мог передать ваш контакт заказчику.";
        }

        // Приветствие или предложение услуги
        if (lowerText.includes("привет") || lowerText.includes("заказать") || lowerText.includes("прокачать") || lowerText.includes("lords")) {
            return "👋 Привет! Хочу заказать прокачку аккаунта в Lords Mobile.\n\nСамому заниматься этим неинтересно, но аккаунт нужен для одной цели.\n\nЧто требуется:\n— установить игру;\n— создать аккаунт и привязать к новой пустой почте;\n— прокачать его.\n\nГотов заплатить 200–300 рублей.\n\n✅ Если согласны — напишите 'согласен'.\n❌ Если нет — напишите 'отказ'.";
        }

        // Всё непонятное — шлём в Telegram без контакта
        sendToTelegram(`❓ НЕПОНЯТНОЕ СООБЩЕНИЕ:\nПользователь: "${text}"`);
        return "❓ Не понял. Ваше сообщение отправлено мне. Я отвечу в ближайшее время. А пока напишите 'согласен' или 'отказ'.";
    }

    function addMessage(sender, message) {
        const chat = document.getElementById("chat");
        const msgDiv = document.createElement("div");
        msgDiv.className = "msg";
        msgDiv.innerHTML = `<div class="${sender}">${sender === 'user' ? '🧑 Вы' : '🤖 Бот'}: ${message}</div>`;
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const userText = input.value.trim();
        if (!userText) return;
        addMessage("user", userText);
        input.value = "";
        setTimeout(() => {
            const reply = getAutoReply(userText);
            addMessage("bot", reply);
        }, 500);
    }

    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
        addMessage("bot", "👋 Напиши 'Привет' или сразу условия заказа.");
    };
</script>
</body>
</html>
